services:
  netloom:
    build: .
    container_name: netloom
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "${NETLOOM_SERVER_PORT:-51820}:${NETLOOM_SERVER_PORT:-51820}/udp"   # WireGuard
      - "7777:7777/tcp"     # Dashboard (restrict to LAN in production)
    volumes:
      - ./data:/app/data          # SQLite DB + backups
      - ./config:/etc/wireguard   # WireGuard configs
    environment:
      - NETLOOM_SECRET_KEY=${NETLOOM_SECRET_KEY:-change-me-in-production}
      - NETLOOM_ADMIN_PASSWORD=${NETLOOM_ADMIN_PASSWORD:-admin123}
      - NETLOOM_SERVER_ENDPOINT=${NETLOOM_SERVER_ENDPOINT:-vpn.example.com}
      - NETLOOM_SERVER_PORT=${NETLOOM_SERVER_PORT:-51820}
      - NETLOOM_SUBNET=${NETLOOM_SUBNET:-100.169.0.0/16}
      - NETLOOM_DB_PATH=/app/data/netloom.db
      - NETLOOM_WG_CONFIG_PATH=/etc/wireguard
      - NETLOOM_WG_INTERFACE=wg0
